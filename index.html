<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Nota Promissória</title>
    </head>

                <input type="text" id="nomeCredor" name="nomeCredor">

                <input type="text" id="nomeDevedor" name="nomeDevedor">
                <input type="number" id="documentoDevedor" name="documentoDevedor">
                <input type="text" id="rua" name="rua">
                <input type="text" id="pontoReferencia" name="pontoReferencia">
                <input type="number" id="numero" name="numero">
                <input type="text" id="bairro" name="bairro">
                <input type="text" id="cidade" name="cidade">
                <input type="text" id="estado" name="estado">
                <input type="number" id="cep" name="cep">


            </form>
        </div>
    </section>
</body>

</html>
